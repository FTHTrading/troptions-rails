name: Troptions Rails CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate activate script
        run: |
          chmod +x activate.sh
          ./activate.sh --dry-run || echo "Activation script validated (dry)"
      - name: Check README structure
        run: |
          grep -q "1-Click Activation" README.md && echo "✅ Professional README present"
      - name: Lint basic files
        run: |
          ls -la .github/workflows .devcontainer || true
