[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "tests"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/src/"
]

[profile.ci]
via-ir = true
optimizer = true
optimizer_runs = 200
